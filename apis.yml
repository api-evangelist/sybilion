name: Sybilion
description: >-
  Sybilion is a decision layer for industrial companies, providing economic and causal forecasting that connects
  external market dynamics to internal exposure for procurement, trading and risk teams. It exposes forecasts, their
  drivers, and alerts via a REST API and a hosted MCP server.
